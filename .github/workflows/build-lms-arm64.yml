name: Build LMS for ARM64

on:
  workflow_dispatch: # Permite iniciar manualmente pela aba Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Compilar no container Debian ARM64 emulado
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: aarch64
          distro: bookworm
          githubToken: ${{ github.token }}
          setup: |
            mkdir -p "${PWD}/artifacts"
          dockerRunArgs: |
            --volume "${PWD}/artifacts:/artifacts"
          run: |
            # Instalar ferramentas e bibliotecas de desenvolvimento no Debian emulado
            apt-get update && apt-get install -y \
              build-essential cmake git libboost-program-options-dev \
              libboost-system-dev libboost-thread-dev libboost-filesystem-dev \
              libboost-date-time-dev libavutil-dev libavformat-dev libswresample-dev \
              ffmpeg libconfig++-dev libstb-dev libtag-dev libpugixml-dev \
              libgtest-dev libarchive-dev libxxhash-dev libssl-dev zlib1g-dev \
              libgraphicsmagick++1-dev libpstreams-dev

            # 1. Compilar Wt4
            git clone --depth 1 https://github.com/emweb/wt.git
            cd wt
            mkdir build_wt && cd build_wt
            cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF -DSHARED_LIBS=ON
            make -j$(nproc)
            make install
            ldconfig
            cd ../.. && rm -rf wt

            # 2. Compilar LMS
            git clone https://github.com/epoupon/lms.git
            cd lms
            mkdir build_lms && cd build_lms
            cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_UNITY_BUILD=ON -DCMAKE_INSTALL_PREFIX=/usr
            make -j$(nproc)
            
            # Instalar em um diretório temporário para gerar o pacote
            mkdir -p /tmp/lms-package
            make install DESTDIR=/tmp/lms-package
            
            # Gerar tarball mantendo a estrutura de pastas do sistema (/usr/bin, /usr/share, /etc...)
            tar -czvf /artifacts/lms-arm64.tar.gz -C /tmp/lms-package .

      - name: Fazer upload do binário compilado
        uses: actions/upload-artifact@v4
        with:
          name: lms-arm64
          path: artifacts/lms-arm64.tar.gz